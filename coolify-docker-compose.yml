services:
  hostmint:
    image: ghcr.io/jehudme/hostmint:latest
    environment:
      - _JAVA_OPTIONS=-Xmx512m -Xms256m
      - SPRING_PROFILES_ACTIVE=prod,api-docs
      - SPRING_DATASOURCE_URL=jdbc:postgresql://hostmint-postgresql:5432/hostMint
      - SPRING_DATASOURCE_USERNAME=hostMint
      - SPRING_DATASOURCE_PASSWORD=${DATABASE_PASSWORD}
      - SPRING_LIQUIBASE_URL=jdbc:postgresql://hostmint-postgresql:5432/hostMint
      - SPRING_ELASTICSEARCH_URIS=http://hostmint-elasticsearch:9200
      # La variable de sécurité avec le bon nom (_BASE64_)
      - JHIPSTER_SECURITY_AUTHENTICATION_JWT_BASE64_SECRET=${JWT_SECRET}
      - MANAGEMENT_METRICS_EXPORT_PROMETHEUS_ENABLED=true
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8080/management/health']
      interval: 20s
      timeout: 5s
      retries: 15
    depends_on:
      hostmint-postgresql:
        condition: service_healthy
      hostmint-elasticsearch:
        condition: service_healthy

  hostmint-postgresql:
    image: postgres:17.3
    environment:
      - POSTGRES_USER=hostMint
      - POSTGRES_PASSWORD=${DATABASE_PASSWORD}
      - POSTGRES_DB=hostMint
    volumes:
      - hostmint_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U hostMint']
      interval: 10s
      timeout: 5s
      retries: 5

  hostmint-elasticsearch:
    # Version 8.12.2 pour régler le bug HTTP 400 (indices.exists)
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.2
    environment:
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - discovery.type=single-node
      - xpack.security.enabled=false
    volumes:
      - hostmint_es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9200/_cluster/health']
      interval: 20s
      timeout: 10s
      retries: 10

  # --- Monitoring Stack ---

  prometheus:
    image: prom/prometheus:v3.10.0
    volumes:
      - prometheus_data:/prometheus
    # Remplacement des "volumes" par "configs" pour éviter l'erreur de dossier
    configs:
      - source: prometheus_config
        target: /etc/prometheus/prometheus.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'

  alertmanager:
    image: prom/alertmanager:v0.31.1
    volumes:
      - alertmanager_data:/alertmanager
    # Injection native du fichier
    configs:
      - source: alertmanager_config
        target: /etc/alertmanager/config.yml
    command:
      - '--config.file=/etc/alertmanager/config.yml'

  grafana:
    image: grafana/grafana:12.4.1
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana

# --- Déclaration des volumes persistants ---
volumes:
  hostmint_db_data:
  hostmint_es_data:
  prometheus_data:
  alertmanager_data:
  grafana_data:

# --- Définition du contenu des Configs Docker ---
configs:
  prometheus_config:
    content: |
      global:
        scrape_interval: 10s
      scrape_configs:
        - job_name: 'hostmint'
          metrics_path: '/management/prometheus'
          static_configs:
            - targets: ['hostmint:8080']

  alertmanager_config:
    content: |
      route:
        group_by: ['alertname']
        receiver: 'web.hook'
      receivers:
        - name: 'web.hook'
          webhook_configs:
            - url: 'http://127.0.0.1:5001/'
