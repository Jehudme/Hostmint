<div class="d-flex justify-content-center">
  <div class="col-8">
    @if (project(); as projectRef) {
      <div>
        <h2 data-cy="projectDetailsHeading"><span jhiTranslate="hostMintApp.project.detail.title">Project</span></h2>

        <hr />

        <jhi-alert-error />

        <jhi-alert />

        <dl class="row-md jh-entity-details">
          <dt><span jhiTranslate="global.field.id">ID</span></dt>
          <dd>
            <span>{{ projectRef.id }}</span>
          </dd>
          <dt><span jhiTranslate="hostMintApp.project.name">Name</span></dt>
          <dd>
            <span>{{ projectRef.name }}</span>
          </dd>
          <dt><span jhiTranslate="hostMintApp.project.projectKey">Project Key</span></dt>
          <dd>
            <span>{{ projectRef.projectKey }}</span>
          </dd>
          <dt><span jhiTranslate="hostMintApp.project.createdAt">Created At</span></dt>
          <dd>
            <span>{{ projectRef.createdAt | formatMediumDatetime }}</span>
          </dd>
          <dt><span jhiTranslate="hostMintApp.project.updatedAt">Updated At</span></dt>
          <dd>
            <span>{{ projectRef.updatedAt | formatMediumDatetime }}</span>
          </dd>
          <dt><span jhiTranslate="hostMintApp.project.owner">Owner</span></dt>
          <dd>
            <span>{{ projectRef.owner?.login }}</span>
          </dd>
        </dl>

        <button type="submit" (click)="previousState()" class="btn btn-info" data-cy="entityDetailsBackButton">
          <fa-icon icon="arrow-left" />&nbsp;<span jhiTranslate="entity.action.back">Retour</span>
        </button>

        <button type="button" [routerLink]="['/project', projectRef.id, 'edit']" class="btn btn-primary">
          <fa-icon icon="pencil-alt" />&nbsp;<span jhiTranslate="entity.action.edit">Editer</span>
        </button>
      </div>
    }
  </div>
</div>
