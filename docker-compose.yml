services:
  hostmint:
    image: ghcr.io/jehudme/hostmint:latest
    environment:
      - _JAVA_OPTIONS=-Xmx512m -Xms256m
      - SPRING_PROFILES_ACTIVE=prod,api-docs
      - SPRING_DATASOURCE_URL=jdbc:postgresql://hostmint-postgresql:5432/hostMint
      - SPRING_DATASOURCE_USERNAME=hostMint
      - SPRING_DATASOURCE_PASSWORD=${DATABASE_PASSWORD}
      - SPRING_LIQUIBASE_URL=jdbc:postgresql://hostmint-postgresql:5432/hostMint
      - SPRING_ELASTICSEARCH_URIS=http://hostmint-elasticsearch:9200
      - JHIPSTER_SECURITY_AUTHENTICATION_JWT_SECRET=${JWT_SECRET}
      - MANAGEMENT_METRICS_EXPORT_PROMETHEUS_ENABLED=true
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8080/management/health']
      interval: 15s
      timeout: 5s
      retries: 10
    depends_on:
      hostmint-postgresql:
        condition: service_healthy
      hostmint-elasticsearch:
        condition: service_healthy

  hostmint-postgresql:
    image: postgres:17.3
    environment:
      - POSTGRES_USER=hostMint
      - POSTGRES_PASSWORD=${DATABASE_PASSWORD}
      - POSTGRES_DB=hostMint
    volumes:
      - hostmint_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U hostMint']
      interval: 5s
      timeout: 5s
      retries: 10

  hostmint-elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.10.2
    environment:
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - discovery.type=single-node
      - xpack.security.enabled=false
    volumes:
      - hostmint_es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9200/_cluster/health']
      interval: 10s
      timeout: 10s
      retries: 10

  # --- Monitoring Stack ---

  prometheus:
    image: prom/prometheus:v3.10.0
    volumes:
      - prometheus_data:/prometheus
      - type: bind
        source: ./prometheus-conf/prometheus.yml
        target: /etc/prometheus/prometheus.yml
        # Coolify injecte ce contenu dans le fichier avant de lancer le conteneur
        content: |
          global:
            scrape_interval: 10s
          scrape_configs:
            - job_name: 'hostmint'
              metrics_path: '/management/prometheus'
              static_configs:
                - targets: ['hostmint:8080']
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'

  alertmanager:
    image: prom/alertmanager:v0.31.1
    volumes:
      - alertmanager_data:/alertmanager
      - type: bind
        source: ./alertmanager-conf/config.yml
        target: /etc/alertmanager/config.yml
        content: |
          route:
            group_by: ['alertname']
            receiver: 'web.hook'
          receivers:
            - name: 'web.hook'
              webhook_configs:
                - url: 'http://127.0.0.1:5001/'
    command:
      - '--config.file=/etc/alertmanager/config.yml'

  grafana:
    image: grafana/grafana:12.4.1
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana

volumes:
  hostmint_db_data:
  hostmint_es_data:
  prometheus_data:
  alertmanager_data:
  grafana_data:
