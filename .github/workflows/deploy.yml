name: HostMint CI/CD

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Cache Jib layers
        uses: actions/cache@v4
        with:
          path: ~/.cache/google-cloud-tools-java/jib
          key: ${{ runner.os }}-jib-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-jib-

      - name: Make mvnw executable
        run: chmod +x mvnw

      - name: Build and Push to GHCR
        run: |
          IMAGE_ID=ghcr.io/${{ github.repository_owner }}/hostmint
          IMAGE_ID=$(echo $IMAGE_ID | tr '[:upper:]' '[:lower:]')
          
          echo "Targeting Registry: $IMAGE_ID"
          
          # Added -ntp (no transfer progress) to clean up logs
          # Added -T 1C to use one thread per core for faster compilation
          ./mvnw package -Pprod verify jib:build -ntp -T 1C \
            -Djib.to.image=$IMAGE_ID \
            -Djib.to.auth.username=${{ github.actor }} \
            -Djib.to.auth.password=${{ secrets.GITHUB_TOKEN }}
