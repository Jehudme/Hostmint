name: HostMint CI/CD

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install JHipster CLI
        run: npm install -g generator-jhipster@9.0.0

      - name: Cache Jib layers
        uses: actions/cache@v4
        with:
          path: ~/.cache/google-cloud-tools-java/jib
          key: ${{ runner.os }}-jib-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-jib-

      - name: Make mvnw executable
        run: chmod +x mvnw

      - name: Regenerate from JDL (regen gate)
        run: |
          jhipster jdl hostmin.jdl --force

          # JHipster 9 --force bypasses .jhipsterignore.
          # Restore every file listed in .jhipsterignore that is tracked by git,
          # so our intentionally custom files are not replaced by generated ones.
          while IFS= read -r ignored_file || [ -n "$ignored_file" ]; do
            # Skip blank lines and comment lines
            [[ -z "$ignored_file" || "$ignored_file" =~ ^[[:space:]]*# ]] && continue
            # Only restore if the file is tracked (i.e. committed) and has been modified
            if git ls-files --error-unmatch "$ignored_file" 2>/dev/null; then
              git checkout -- "$ignored_file"
              echo "Restored .jhipsterignore-protected file: $ignored_file"
            fi
          done < .jhipsterignore

          # After restoring protected files, any remaining diff means JHipster
          # overwrote a file we did NOT protect — that is unexpected drift.
          DRIFT="$(git status --porcelain)"
          if [ -n "$DRIFT" ]; then
            echo "::error::Regeneration drift detected after 'jhipster jdl hostmin.jdl --force'."
            echo "::error::The following generated files differ from the committed state:"
            printf "%s\n" "$DRIFT"
            echo "::error::Move your customizations into new non-generated files/classes and"
            echo "::error::do NOT edit JHipster-owned files directly."
            exit 1
          fi

          echo "Regen gate passed — no unexpected drift detected."

      - name: Build and Push to GHCR
        env:
          CYPRESS_INSTALL_BINARY: 0
        run: |
          IMAGE_ID=ghcr.io/${{ github.repository_owner }}/hostmint
          IMAGE_ID=$(echo $IMAGE_ID | tr '[:upper:]' '[:lower:]')

          echo "Targeting Registry: $IMAGE_ID"

          ./mvnw package -Pprod verify jib:build -ntp -T 1C \
            -Djib.to.image=$IMAGE_ID \
            -Djib.to.auth.username=${{ github.actor }} \
            -Djib.to.auth.password=${{ secrets.GITHUB_TOKEN }}
